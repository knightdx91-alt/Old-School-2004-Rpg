name: Deploy to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Babylon.js engine + loaders (bundle locally, no CDN needed)
        run: |
          curl -L -o js/babylon.js "https://cdn.jsdelivr.net/npm/babylonjs@6.49.0/babylon.min.js"
          curl -L -o js/babylonjs.loaders.min.js "https://cdn.jsdelivr.net/npm/babylonjs-loaders@6.49.0/babylonjs.loaders.min.js"

      - name: Build
        run: |
          mkdir -p build
          cp index.html styles.css build/
          cp -r js build/
          # Ship only runtime assets (.glb/.png); skip source-format duplicates
          rsync -a \
            --exclude='*.zip' \
            --exclude='*.fbx' \
            --exclude='*.obj' \
            --exclude='*.mtl' \
            --exclude='*.stl' \
            --exclude='*.dae' \
            --exclude='*.unitypackage' \
            --exclude='*.url' \
            --exclude='*.txt' \
            --exclude='*.py' \
            assets build/
          echo "Build size:"; du -sh build

      - name: Install butler
        run: |
          # itch.io's official CDN (the GitHub-releases asset URL is dead).
          # Retry on transient DNS/connection failures from the runner.
          for i in 1 2 3 4 5; do
            curl -fsSL --retry 5 --retry-all-errors --connect-timeout 20 \
              -o butler.zip "https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default" \
              && unzip -tq butler.zip && break
            echo "butler download attempt $i failed; retrying..."
            sleep $((i * 4))
          done
          unzip -o butler.zip
          chmod +x butler
          ./butler -V

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push build Knightdx91/sygl:html5
