<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Sygl — A Magykal RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=5">

<!-- These two MUST run before everything else (sync, no defer) -->
<script src="js/gamepad-patch.js?v=5"></script>
<script src="js/babylon-loader.js?v=5"></script>

<!-- Game scripts are loaded by babylon-loader.js after Babylon is ready -->
</head>
<body>

<!-- TITLE -->
<div id="title-screen" class="screen active">
  <h1>SYGL</h1>
    <div class="subtitle">— A Tale of the Magyk Arts —</div>
      <div class="menu">
          <button class="btn primary" onclick="game.startNewGame()">Begin Anew</button>
              <button class="btn" id="continue-btn" onclick="game.continueGame()" style="display:none;">Continue</button>
                  <button class="btn" onclick="game.skipQuiz()">Skip Quiz — Choose Sygl</button>
                    </div>
                      <div style="margin-top: 4rem; max-width: 540px; text-align: center; font-style: italic; color: rgba(217,201,168,0.5); line-height: 1.6;">
                          Five Originators wove the world from raw magyk. Their sygls mark the chosen.<br>
                              Without one, you should be powerless — and yet, here you are.
                                </div>
                                </div>

                                <!-- QUIZ -->
                                <div id="quiz-screen" class="screen">
                                  <div class="quiz-container">
                                      <div class="quiz-progress" id="quiz-progress">Question 1 of 6</div>
                                          <div class="quiz-question" id="quiz-question"></div>
                                              <div class="quiz-options" id="quiz-options"></div>
                                                </div>
                                                </div>

                                                <!-- SYGL SELECT -->
                                                <div id="sygl-screen" class="screen">
                                                  <h2>Choose Your Sygl</h2>
                                                    <div class="recommendation" id="recommendation"></div>
                                                      <div class="sygl-grid" id="sygl-grid"></div>
                                                        <button class="btn primary" id="confirm-sygl" disabled onclick="game.confirmSygl()">Embrace This Path</button>
                                                        </div>

                                                        <!-- ORIGINATOR INTRO -->
                                                        <div id="intro-screen" class="screen">
                                                          <div class="intro-stage" id="intro-stage" onclick="intro.advance()">
                                                              <div class="intro-portrait" id="intro-portrait">
                                                                    <div class="orig-aura"></div>
                                                                          <svg id="orig-svg" viewBox="0 0 300 400" style="position:relative; z-index:1; width:100%; height:100%; filter: drop-shadow(0 0 30px var(--accent));"></svg>
                                                                              </div>
                                                                                  <div class="intro-text-wrap">
                                                                                        <div class="intro-name" id="intro-name">—</div>
                                                                                              <div class="intro-title" id="intro-title">—</div>
                                                                                                    <div class="intro-dialogue" id="intro-dialogue">—</div>
                                                                                                          <div class="intro-advance">CLICK TO CONTINUE ▸</div>
                                                                                                              </div>
                                                                                                                </div>
                                                                                                                </div>

                                                                                                                <!-- GAME -->
                                                                                                                <div id="game-screen" class="screen">
                                                                                                                  <div class="game-root">
                                                                                                                      <div class="canvas-wrap" id="canvas-wrap">
                                                                                                                            <div class="topbar">
                                                                                                                                    <div>
                                                                                                                                              <div class="area-name" id="area-name">New Spring</div>
                                                                                                                                                        <div class="time-of-day" id="time-of-day">— Dawn —</div>
                                                                                                                                                                </div>
                                                                                                                                                                          </div>
                                                                                                                                                                                                                <canvas id="render-canvas"></canvas>
                                                                                                                                                                                                                      <div class="cursor-target" id="cursor-target"></div>
                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                              <div class="hud" id="hud">
                                                                                                                                                                                                                                    <div class="hud-tabs" id="hud-tabs">
                                                                                                                                                                                                                                            <button class="hud-tab active" data-tab="stats" onclick="hud.switchTab('stats')">Stats</button>
                                                                                                                                                                                                                                                    <button class="hud-tab" data-tab="inventory" onclick="hud.switchTab('inventory')">Inventory</button>
                                                                                                                                                                                                                                                            <button class="hud-tab" data-tab="spellbook" onclick="hud.switchTab('spellbook')">Spellbook</button>
                                                                                                                                                                                                                                                                    <button class="hud-tab" data-tab="quests" onclick="hud.switchTab('quests')">Quests</button>
                                                                                                                                                                                                                                                                            <button class="hud-tab" data-tab="options" onclick="hud.switchTab('options')">Options</button>
                                                                                                                                                                                                                                                                                    <button class="hud-tab combat-tab" data-tab="combat" id="combat-tab" style="display:none;" onclick="hud.switchTab('combat')">⚔ Combat</button>
                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                <div class="hud-content">
                                                                                                                                                                                                                                                                                                        <div class="hud-log" id="log"></div>
                                                                                                                                                                                                                                                                                                                <div class="hud-panel" id="hud-panel"></div>
                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                            <!-- Context menu -->
                                                                                                                                                                                                                                                                                                                            <div class="ctx-menu" id="ctx-menu"></div>

            <!-- Loot -->
            <div class="loot-overlay" id="loot-overlay">
              <div class="loot-box">
                <div class="loot-header">
                  <span class="loot-title" id="loot-title">Chest</span>
                  <button class="btn small" id="loot-take-all" onclick="loot.takeAll()">Take All</button>
                  <button class="btn small" onclick="loot.close()">Close</button>
                </div>
                <div class="loot-items" id="loot-items"></div>
              </div>
            </div>

            <!-- Dialogue -->
            <div class="dialogue-overlay" id="dialogue-overlay">
              <div class="dialogue-box">
                <div class="dialogue-speaker" id="dialogue-speaker">—</div>
                <div class="dialogue-text" id="dialogue-text">—</div>
                <div class="dialogue-options" id="dialogue-options"></div>
                <div class="dialogue-advance" id="dialogue-advance" onclick="dialogue.advance()">CLICK TO CONTINUE ▸</div>
              </div>
            </div>

                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                            </html>
